name: Quality Gates

on:
  pull_request:
    branches:
      - dev

jobs:
  quality-gates:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version comes from package.json `packageManager`; pinning it here too
        # makes action-setup@v4 error with "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        # See scripts/run-tests.mjs for why this isn't a plain `node --test`
        # or a `find | xargs` one-liner — both have a silent-false-pass hole
        # on zero matched files. Issue #4: this step never existed before,
        # so lib/utils.test.ts's coverage claim was never actually
        # CI-verified.
        run: pnpm test

      - name: Build
        run: pnpm build
